      - A1_bom:            { target_file: "/root/income.xlsx" }
      - A3_zero_width:     { target_file: "/root/income.xlsx", col_idx: 4 }
      - B1_readonly_output: {}
      - B3_dirty_output:   { output_file: "demographic_analysis.xlsx" }
      - S1_column_rename:  { target_file: "/root/income.xlsx" }
      - S2_column_reorder: { target_file: "/root/income.xlsx" }

